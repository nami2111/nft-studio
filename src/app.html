<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<base href="/" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<meta name="theme-color" content="#3b82f6" />

		<!-- Security Headers -->
		<!-- Note: CSP via <meta> has limitations. frame-ancestors and X-Frame-Options require real HTTP headers.
		     SvelteKit SPA mode requires 'unsafe-inline' for the bootstrap script.
		     For full security, configure real HTTP headers at the ICP hosting level. -->
		<meta
			http-equiv="Content-Security-Policy"
			content="default-src 'self'; script-src 'self' 'unsafe-inline'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://icp0.io https://*.icp0.io; base-uri 'self'; form-action 'self';"
		/>
		<meta http-equiv="X-Content-Type-Options" content="nosniff" />
		<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
		<meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()" />

		<!-- Primary Meta Tags -->
		<title>GNStudio - Generative Art Collection Builder</title>
		<meta name="title" content="GNStudio - Generative Art Collection Builder" />
		<meta
			name="description"
			content="GNStudio is a browser-based platform for generating generative art collections. Create layered artwork with configurable traits, rarity settings, and instant preview — no downloads required."
		/>
		<meta
			name="keywords"
			content="generative art, generative collection, art generator, trait studio, rarity tool, layers"
		/>
		<meta name="author" content="GNStudio Team" />
		<meta name="robots" content="index, follow" />

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://dpl4s-kqaaa-aaaal-asg3a-cai.icp0.io/" />
		<meta property="og:title" content="GNStudio - Generative Art Collection Builder" />
		<meta
			property="og:description"
			content="GNStudio is a browser-based platform for generating generative art collections. Create layered artwork with configurable traits, rarity settings, and instant preview — no downloads required."
		/>
		<meta
			property="og:image"
			content="https://dpl4s-kqaaa-aaaal-asg3a-cai.icp0.io/gnstudio-preview.webp"
		/>
		<meta property="og:image:alt" content="GNStudio - Generative Art Collection Builder" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:site_name" content="GNStudio" />

		<!-- Twitter -->
		<meta property="twitter:card" content="summary_large_image" />
		<meta property="twitter:url" content="https://dpl4s-kqaaa-aaaal-asg3a-cai.icp0.io/" />
		<meta property="twitter:title" content="GNStudio - Generative Art Collection Builder" />
		<meta
			property="twitter:description"
			content="GNStudio is a browser-based platform for generating generative art collections. Create layered artwork with configurable traits, rarity settings, and instant preview — no downloads required."
		/>
		<meta
			property="twitter:image"
			content="https://dpl4s-kqaaa-aaaal-asg3a-cai.icp0.io/gnstudio-preview.webp"
		/>
		<meta property="twitter:image:alt" content="GNStudio - Generative Art Collection Builder" />

		<!-- Additional SEO -->
		<link rel="canonical" href="https://dpl4s-kqaaa-aaaal-asg3a-cai.icp0.io/" />

		<!-- Structured Data -->
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "SoftwareApplication",
				"name": "GNStudio",
				"description": "GNStudio is a browser-based platform for generating generative art collections. Create layered artwork with configurable traits, rarity settings, and instant preview — no downloads required.",
				"url": "https://dpl4s-kqaaa-aaaal-asg3a-cai.icp0.io/",
				"applicationCategory": "DesignApplication",
				"operatingSystem": "Web",
				"author": {
					"@type": "Organization",
					"name": "GNStudio Team"
				},
				"datePublished": "2025-08-26",
				"dateModified": "2026-05-03",
				"offers": {
					"@type": "Offer",
					"price": "0",
					"priceCurrency": "USD"
				}
			}
		</script>

		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover" class="bg-white dark:bg-black">
		<div style="display: contents">%sveltekit.body%</div>
		<script src="%sveltekit.assets%/registerSW.js"></script>
	</body>
</html>
